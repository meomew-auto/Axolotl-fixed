name: Build Tweak

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  THEOS: ${{ github.workspace }}/theos

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Theos
        uses: actions/cache@v4
        id: theos-cache
        with:
          path: ${{ github.workspace }}/theos
          key: ${{ runner.os }}-theos-master-146e41f

      - name: Install Theos
        if: steps.theos-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          git clone --recursive https://github.com/theos/theos.git $THEOS
          curl -sSL -o /tmp/sdk.tar.xz \
            https://github.com/theos/sdks/releases/download/master-146e41f/iPhoneOS16.5.sdk.tar.xz
          tar -xJf /tmp/sdk.tar.xz -C $THEOS/sdks/

      - name: Build DEB (Rootful)
        run: make package FINALPACKAGE=1

      - name: Build DEB (Rootless)
        run: make package FINALPACKAGE=1 ROOTLESS=1

      - name: Upload DEBs
        uses: actions/upload-artifact@v4
        with:
          name: Axolotl-fixed-debs
          path: packages/*.deb
