name: Auto-update for new WhatsApp versions

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am
  workflow_dispatch:

permissions:
  contents: write


jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check latest WhatsApp version on App Store
        id: wa_version
        run: |
          LATEST=$(curl -s "https://itunes.apple.com/lookup?bundleId=net.whatsapp.WhatsApp&country=us" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['results'][0]['version'])")
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "Latest WhatsApp version: $LATEST"

          CURRENT=$(grep 'DEFAULT_VERSION' Tweak.xm | grep -o '"[0-9.]*"' | tr -d '"' | head -1)
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "Current version in code: $CURRENT"

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "UPDATE NEEDED: $CURRENT → $LATEST"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No update needed."
          fi

      - name: Update version in Tweak.xm
        if: steps.wa_version.outputs.changed == 'true'
        run: |
          LATEST="${{ steps.wa_version.outputs.latest }}"
          LATEST_DOTS=$(echo "$LATEST" | tr -cd '.' | wc -c)
          if [ "$LATEST_DOTS" -eq 2 ]; then
            LATEST="${LATEST}.0"
          fi
          sed -i "s/#define DEFAULT_VERSION @\"[0-9.]*\"/#define DEFAULT_VERSION @\"${LATEST}\"/" Tweak.xm
          echo "Updated DEFAULT_VERSION to $LATEST"
          grep 'DEFAULT_VERSION' Tweak.xm

      - name: Commit and push update
        if: steps.wa_version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Tweak.xm
          git commit -m "auto: update DEFAULT_VERSION to ${{ steps.wa_version.outputs.latest }}"
          git push

      - name: No update needed
        if: steps.wa_version.outputs.changed == 'false'
        run: echo "WhatsApp version unchanged (${{ steps.wa_version.outputs.current }}), nothing to do."
